{% extends "base.html" %}
{% block title %}Error {{ error_code }} - CompilerX{% endblock %}
{% block content %}
<div class="container text-center" style="padding-top:120px; min-height:80vh">
  <h1 style="font-size:5rem; color: var(--accent-red)">{{ error_code or 500 }}</h1>
  <h3 class="text-secondary mb-4">{{ error_message or "Something went wrong" }}</h3>
  <a href="/" class="btn btn-primary cx-btn-primary">← Back to Home</a>
</div>
{% endblock %}
