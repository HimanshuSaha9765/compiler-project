# CompilerX - Render Deployment Configuration
# This file tells Render.com how to deploy your app
# Do NOT modify unless you know what you're doing

services:
  - type: web
    name: compiler-project
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_ENV
        value: production
