<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120" role="img" aria-label="Compiler Pipeline">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap');
    .box { fill: #1E293B; stroke: #334155; }
    .txt { fill: #F1F5F9; font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight:600; }
    .sub { fill: #94A3B8; font-family: 'Inter', system-ui, sans-serif; font-size: 11px; }
    .arrow { stroke: #3B82F6; stroke-width:2; fill:none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#3B82F6"/>
    </marker>
  </defs>
  <!-- Boxes -->
  <rect class="box" x="10" y="35" width="110" height="50" rx="10"/>
  <text class="txt" x="65" y="58" text-anchor="middle">Source</text>
  <text class="sub" x="65" y="72" text-anchor="middle">code.c</text>

  <rect class="box" x="155" y="35" width="110" height="50" rx="10"/>
  <text class="txt" x="210" y="65" text-anchor="middle">Lexer</text>

  <rect class="box" x="300" y="35" width="110" height="50" rx="10"/>
  <text class="txt" x="355" y="65" text-anchor="middle">Parser</text>

  <rect class="box" x="445" y="35" width="110" height="50" rx="10"/>
  <text class="txt" x="500" y="58" text-anchor="middle">Symbol</text>
  <text class="sub" x="500" y="72" text-anchor="middle">Table</text>

  <rect class="box" x="590" y="35" width="110" height="50" rx="10"/>
  <text class="txt" x="645" y="65" text-anchor="middle">Scope</text>

  <rect class="box" x="735" y="35" width="140" height="50" rx="10"/>
  <text class="txt" x="805" y="58" text-anchor="middle">Diagnostics</text>
  <text class="sub" x="805" y="72" text-anchor="middle">Health Score</text>

  <!-- Arrows -->
  <line class="arrow" x1="120" y1="60" x2="155" y2="60"/>
  <line class="arrow" x1="265" y1="60" x2="300" y2="60"/>
  <line class="arrow" x1="410" y1="60" x2="445" y2="60"/>
  <line class="arrow" x1="555" y1="60" x2="590" y2="60"/>
  <line class="arrow" x1="700" y1="60" x2="735" y2="60"/>
</svg>
